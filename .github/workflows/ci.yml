# CI Matrix Policy
#
# tools-version 6.3 (requires Swift 6.3): macos-15 + 6.3, macos-26 + 6.3, ubuntu-latest + 6.3
#
# When Swift 6.4 ships: add 6.4 legs alongside 6.3
# When bumping tools-version: drop Swift versions older than the new minimum

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Build and Test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            swift: "6.3"
          - os: macos-26
            swift: "6.3"
          - os: ubuntu-latest
            swift: "6.3"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: ${{ matrix.swift }}
      - name: Build
        run: swift build -v
      - name: Test
        run: swift test -v
  lint:
    name: Run SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint --strict
  swift-format:
    name: Run swift-format
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    steps:
      - uses: actions/checkout@v6
      - name: Download .swift-format config
        run: |
          apt-get update && apt-get install -y wget
          wget -O .swift-format https://gist.githubusercontent.com/RISCfuture/e0c21afb7bd80a88d128a42bf40d2ecd/raw/.swift-format
      - name: Run swift-format lint
        run: swift format lint --strict -r .
