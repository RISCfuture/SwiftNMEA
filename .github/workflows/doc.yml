name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Generate Documentation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.2"
      - name: Build
        run: |
          swift package \
           --allow-writing-to-directory ./docs \
           generate-documentation \
           --target SwiftNMEA --target SwiftDSE --target NMEAUnits --target NMEACommon \
           --output-path ./docs \
           --disable-indexing \
           --transform-for-static-hosting \
           --hosting-base-path SwiftNMEA \
           --enable-experimental-combined-documentation
      - name: Create root redirect
        run: |
          cat > ./docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="0; url=/SwiftNMEA/documentation/swiftnmea/">
              <title>SwiftNMEA Documentation</title>
              <script>
                  window.location.replace("/SwiftNMEA/documentation/swiftnmea/");
              </script>
          </head>
          <body>
              <p>Redirecting to <a href="/SwiftNMEA/documentation/swiftnmea/">SwiftNMEA Documentation</a>...</p>
          </body>
          </html>
          EOF
      - name: Upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs/"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
