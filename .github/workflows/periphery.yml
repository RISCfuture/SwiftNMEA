name: Periphery
on:
  push:
    branches: [main]
  pull_request:
jobs:
  periphery:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3"
      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery
      - name: Run Periphery
        run: periphery scan --strict
